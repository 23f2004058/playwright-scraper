name: Daily Commit

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 23f2004058@ds.study.iitm.ac.in - Create daily commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "Daily update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Daily automated commit - $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push origin HEAD
